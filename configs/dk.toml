# Jellyfin Kiosk Appliance Builder — Danish variant
#
# Build and run a Jellyfin client kiosk appliance image using cijoe
#
# Usage:
#   cijoe tasks/build.yaml --config configs/dk.toml --monitor

[jkab]
variant = "dk"
ui_culture = "da"
metadata_country = "DK"
metadata_language = "da"
timezone = "Europe/Copenhagen"
subtitle_language = "da"
audio_language = "da"
subtitle_mode = "Smart"

[cijoe.transport.qemu_guest]
username = "root"
password = "root"
hostname = "localhost"
port = 4200

[cijoe.workflow]
fail_fast = true

[qemu]
img_bin = "qemu-img"

[qemu.systems.x86_64]
bin = "/usr/bin/qemu-system-x86_64"

# Guest definition for launching the baked appliance image
[qemu.guests.jkab-dk-x86_64]
path = "{{ local.env.HOME }}/guests/jkab-dk-x86_64"
system_label = "x86_64"
system_image_name = "jkab-dk-x86_64"
system_args.kwa = {cpu = "host", smp = 4, m = "4G", accel = "kvm"}
system_args.tcp_forward = {host = 4200, guest = 22}

# System image: Debian 13 cloud image + Jellyfin appliance cloud-init
[system-imaging.images.jkab-dk-x86_64]
system_label = "x86_64"

cloud.url = "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-generic-amd64-daily.qcow2"
cloud.path = "{{ local.env.HOME }}/system_imaging/cloud/debian-13-generic-amd64-daily.qcow2"
cloud.metadata_path = "{{ resources.auxiliary['cloudinit-metadata'] }}"
cloud.userdata_path = "{{ resources.auxiliary['cloudinit-userdata'] }}"

disk.path = "{{ local.env.HOME }}/system_imaging/disk/jkab-dk-x86_64.qcow2"
