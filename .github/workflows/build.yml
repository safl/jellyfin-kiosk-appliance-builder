name: Build Jellyfin Kiosk Appliance Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/refenv/cijoe-docker:latest
      options: >
        --device=/dev/kvm
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Install
      run: |
        make deps
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Build
      run: make build

    - name: Test
      run: make test

    - name: Convert to compressed raw
      run: |
        DISK="$HOME/system_imaging/disk/jkab-dk-x86_64"
        echo "=== Image sizes ==="
        qemu-img info "$DISK.qcow2"
        ls -l "$DISK.qcow2"
        qemu-img convert -O raw "$DISK.qcow2" "$DISK.raw"
        ls -l "$DISK.raw"
        gzip -9 "$DISK.raw"
        ls -l "$DISK.raw.gz"

    - name: Show artifact sizes
      run: |
        echo "=== Artifacts to upload ==="
        ls -l ~/system_imaging/disk/jkab-dk-x86_64.qcow2
        ls -l ~/system_imaging/disk/jkab-dk-x86_64.raw.gz

    - name: Upload disk image
      uses: actions/upload-artifact@v5
      with:
        name: jkab-dk-x86_64
        path: |
          ~/system_imaging/disk/jkab-dk-x86_64.qcow2
          ~/system_imaging/disk/jkab-dk-x86_64.raw.gz
        compression-level: 0

    - name: Upload cijoe report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: cijoe-report
        path: cijoe-output/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v5

    - name: Package cijoe report
      run: zip -r cijoe-report.zip cijoe-report/

    - name: Show release asset sizes
      run: |
        echo "=== Release assets ==="
        ls -l jkab-dk-x86_64/jkab-dk-x86_64.qcow2
        ls -l jkab-dk-x86_64/jkab-dk-x86_64.raw.gz
        ls -l cijoe-report.zip

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          jkab-dk-x86_64/jkab-dk-x86_64.qcow2
          jkab-dk-x86_64/jkab-dk-x86_64.raw.gz
          cijoe-report.zip
