---
doc: |
  Jellyfin Kiosk Appliance
  ========================

  Build a Jellyfin client kiosk appliance disk image from a Debian cloud image.

  The workflow:

  1. Downloads the Debian 13 cloud image
  2. Injects cloud-init config (openbox, Jellyfin Media Player, HDMI CEC)
  3. Boots QEMU, cloud-init provisions everything, VM shuts down
  4. Produces a baked qcow2 disk image ready to deploy

steps:
- name: gen_userdata
  uses: gen_userdata

- name: diskimage_build
  uses: diskimage_build
  with:
    image_name: jkab-dk-x86_64

